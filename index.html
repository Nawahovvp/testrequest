<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- ลบแคชเดิมทุกครั้ง -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Employee Login - Spare Parts Request</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }
        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow: hidden;
            padding: 16px;
        }
        .background-blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.2), rgba(139, 92, 246, 0.2));
            filter: blur(120px);
            border-radius: 50%;
            z-index: -1;
            animation: move-blob 25s infinite alternate;
        }
        @keyframes move-blob {
            from { transform: translate(-15%, -15%); }
            to { transform: translate(15%, 15%); }
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 32px 24px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fade-in 0.8s ease-out;
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo {
            width: 72px;
            height: 72px;
            background: var(--primary);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 36px;
            box-shadow: 0 0 25px rgba(37, 99, 235, 0.4);
        }
        h1 {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        p.subtitle {
            font-size: 15px;
            color: var(--text-muted);
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14.5px;
            margin-bottom: 8px;
            color: var(--text-muted);
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }
        .remember-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            user-select: none;
        }
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
        }
        .clear-remember {
            text-align: right;
            margin-bottom: 24px;
        }
        .clear-remember button {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 13.5px;
            text-decoration: underline;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16.5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }
        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border-left: 4px solid #ef4444;
            color: #fca5a5;
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14.5px;
            display: none;
        }
        .spinner {
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loader-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }
        .loader-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Responsive สำหรับมือถือ */
        @media (max-width: 480px) {
            .login-container {
                padding: 28px 20px;
                border-radius: 20px;
            }
            h1 { font-size: 24px; }
            .logo { width: 65px; height: 65px; font-size: 32px; }
            input[type="text"], input[type="password"] {
                padding: 13px 14px;
                font-size: 16px;
            }
            button { padding: 14px; font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="background-blob"></div>
   
    <div id="loadingOverlay" class="loader-overlay">
        <div class="spinner" style="width: 55px; height: 55px; border-width: 5px;"></div>
        <p style="margin-top: 24px; color: var(--text-muted); font-size: 15.5px;">กำลังเข้าสู่ระบบอัตโนมัติ...</p>
    </div>
    
    <div class="login-container">
        <div class="header">
            <div class="logo">🔑</div>
            <h1>เข้าสู่ระบบ</h1>
            <p class="subtitle">ระบบขอโอนอะไหล่จากคลังนวนคร</p>
        </div>
       
        <div id="errorBox" class="error-msg"></div>
       
        <div class="input-group">
            <label for="userId">Username</label>
            <input type="text" id="userId" placeholder="กรอกรหัสพนักงาน" autocomplete="username">
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••" autocomplete="current-password">
        </div>
       
        <div class="remember-group">
            <input type="checkbox" id="rememberMe" checked>
            <label for="rememberMe">จดจำการเข้าสู่ระบบ</label>
        </div>
       
        <div class="clear-remember">
            <button type="button" id="clearRememberBtn">ล้างข้อมูลที่จำไว้</button>
        </div>
        <button id="loginBtn">
            <span id="btnText">เข้าสู่ระบบ</span>
            <div id="btnSpinner" class="spinner" style="display: none;"></div>
        </button>
    </div>

    <script>
        const SHEET_ID = '1eqVoLsZxGguEbRCC5rdI4iMVtQ7CK4T3uXRdx8zE3uw';
        const SHEET_NAME = 'Employee_Auth';
        const JSON_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;
       
        const APP_VERSION = '20260410';
        const userIdInput = document.getElementById('userId');
        const passwordInput = document.getElementById('password');
        const rememberMeInput = document.getElementById('rememberMe');
        const loginBtn = document.getElementById('loginBtn');
        const errorBox = document.getElementById('errorBox');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const clearRememberBtn = document.getElementById('clearRememberBtn');

        const REDIRECT_MAP = {
            '0326': 'https://spareparts-request.vercel.app/',
            '0330': 'https://request-nawanakorn-newversion.vercel.app/'
        };

        clearRememberBtn.addEventListener('click', () => {
            if (confirm('คุณต้องการล้างข้อมูลที่จำไว้ทั้งหมดใช่หรือไม่?')) {
                localStorage.clear();
                userIdInput.value = '';
                passwordInput.value = '';
                alert('✅ ล้างข้อมูลเรียบร้อยแล้ว');
            }
        });

        // Auto Login + ลบแคชเมื่อเปิดหน้า
        window.onload = async () => {
            localStorage.removeItem('remember_version'); // ล้างเวอร์ชันเก่า
            
            const savedUser = localStorage.getItem('remembered_id');
            if (savedUser) {
                userIdInput.value = savedUser;
                passwordInput.value = savedUser.slice(-4);
            }

            // Auto Login ทันที
            setTimeout(() => {
                handleLogin(true);
            }, 700);
        };

        async function handleLogin(isAuto = false) {
            const userId = userIdInput.value.trim();
            const password = passwordInput.value.trim();

            if (!userId || !password) {
                if (!isAuto) showError('กรุณากรอก Username และ Password');
                loadingOverlay.classList.add('hidden');
                return;
            }

            if (password !== userId.slice(-4)) {
                if (!isAuto) showError('Password ไม่ถูกต้อง (ต้องเป็น 4 ตัวท้ายของ IDRec)');
                loadingOverlay.classList.add('hidden');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch(JSON_URL + '&t=' + Date.now());
                const text = await response.text();
                const jsonData = JSON.parse(text.substring(47, text.length - 2));
                const rows = jsonData.table.rows;
                const cols = jsonData.table.cols;

                const idIdx = cols.findIndex(c => c.label === 'IDRec');
                const plantIdx = cols.findIndex(c => c.label === 'Plant');

                if (idIdx === -1 || plantIdx === -1) {
                    showError('โครงสร้างข้อมูลไม่ถูกต้อง');
                    setLoading(false);
                    return;
                }

                const userRow = rows.find(row => String(row.c[idIdx]?.v || '') === userId);

                if (!userRow) {
                    showError('ไม่พบรหัสพนักงานนี้ในระบบ');
                    setLoading(false);
                } else {
                    const plant = String(userRow.c[plantIdx]?.v || '').trim();

                    if (rememberMeInput.checked) {
                        localStorage.setItem('remembered_id', userId);
                        localStorage.setItem('remember_version', APP_VERSION);
                    }

                    const targetUrl = REDIRECT_MAP[plant];
                    if (targetUrl) {
                        window.location.href = targetUrl;
                    } else {
                        showError(`Plant ${plant} ไม่มีสิทธิ์ใช้งานระบบนี้`);
                        setLoading(false);
                    }
                }
            } catch (err) {
                console.error(err);
                showError('เชื่อมต่อฐานข้อมูลล้มเหลว กรุณาลองใหม่');
                setLoading(false);
            }
        }

        loginBtn.addEventListener('click', () => handleLogin(false));

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.style.display = 'block';
        }

        function setLoading(isLoading) {
            loginBtn.disabled = isLoading;
            document.getElementById('btnText').style.display = isLoading ? 'none' : 'inline';
            document.getElementById('btnSpinner').style.display = isLoading ? 'block' : 'none';
        }
    </script>
</body>
</html>
