<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- แรงสุดๆ ในการลบแคช -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Cache-Control" content="private, no-cache, no-store, proxy-revalidate, must-revalidate">

    <title>Employee Login - Spare Parts Request</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            padding: 16px;
        }
        .background-blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.2), rgba(139, 92, 246, 0.2));
            filter: blur(120px);
            border-radius: 50%;
            z-index: -1;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 32px 24px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .header { text-align: center; margin-bottom: 32px; }
        .logo {
            width: 72px; height: 72px;
            background: var(--primary);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 36px;
        }
        h1 { font-size: 26px; font-weight: 600; }
        p.subtitle { font-size: 15px; color: var(--text-muted); }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 14.5px; margin-bottom: 8px; color: var(--text-muted); }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16.5px;
            font-weight: 600;
            margin-top: 10px;
        }
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border-left: 4px solid #ef4444;
            color: #fca5a5;
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .spinner {
            width: 22px; height: 22px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        @media (max-width: 480px) {
            .login-container { padding: 28px 20px; border-radius: 20px; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="background-blob"></div>
   
    <div id="loadingOverlay" class="loader-overlay">
        <div class="spinner" style="width: 55px; height: 55px; border-width: 5px;"></div>
        <p style="margin-top: 24px; color: var(--text-muted);">กำลังล้างแคชและเข้าสู่ระบบ...</p>
    </div>
    
    <div class="login-container">
        <div class="header">
            <div class="logo">🔑</div>
            <h1>เข้าสู่ระบบ</h1>
            <p class="subtitle">ระบบขอโอนอะไหล่จากคลังนวนคร</p>
        </div>
       
        <div id="errorBox" class="error-msg"></div>
       
        <div class="input-group">
            <label for="userId">Username</label>
            <input type="text" id="userId" placeholder="กรอกรหัสพนักงาน">
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••">
        </div>
       
        <div class="remember-group" style="margin-bottom:20px;">
            <input type="checkbox" id="rememberMe" checked>
            <label for="rememberMe">จดจำการเข้าสู่ระบบ</label>
        </div>

        <button id="loginBtn">
            <span id="btnText">เข้าสู่ระบบ</span>
            <div id="btnSpinner" class="spinner" style="display:none;"></div>
        </button>
    </div>

    <script>
        // Force clear cache + Auto Login
        window.onload = function() {
            localStorage.clear();           // ลบข้อมูลเก่าทั้งหมด
            sessionStorage.clear();

            // Auto Login
            setTimeout(() => {
                handleLogin(true);
            }, 500);
        };

        async function handleLogin(isAuto) {
            // ... (โค้ดส่วนที่เหลือเหมือนเดิม)
            const userId = document.getElementById('userId').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!userId || !password) {
                if (!isAuto) alert('กรุณากรอก Username และ Password');
                return;
            }
            if (password !== userId.slice(-4)) {
                if (!isAuto) alert('Password ต้องเป็น 4 ตัวท้ายของรหัสพนักงาน');
                return;
            }

            document.getElementById('loadingOverlay').style.display = 'flex';

            try {
                const SHEET_ID = '1eqVoLsZxGguEbRCC5rdI4iMVtQ7CK4T3uXRdx8zE3uw';
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Employee_Auth&t=${Date.now()}`;
                
                const response = await fetch(url);
                const text = await response.text();
                const jsonData = JSON.parse(text.substring(47, text.length - 2));
                // ... (ส่วนที่เหลือเหมือนโค้ดก่อนหน้า)

                // ไว้ให้คุณเติมส่วนตรวจสอบและ redirect ตามเดิม
                console.log("Login success - redirecting");
            } catch(e) {
                console.error(e);
            }
        }

        document.getElementById('loginBtn').addEventListener('click', () => handleLogin(false));
    </script>
</body>
</html>
