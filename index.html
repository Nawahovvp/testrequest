<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Employee Login - Spare Parts Request</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            padding: 16px;
        }
        .background-blob {
            position: absolute;
            width: 600px; height: 600px;
            background: linear-gradient(135deg, rgba(37,99,235,0.2), rgba(139,92,246,0.2));
            filter: blur(120px);
            border-radius: 50%;
            z-index: -1;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 32px 24px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .header { text-align: center; margin-bottom: 32px; }
        .logo {
            width: 72px; height: 72px;
            background: var(--primary);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            font-size: 36px;
        }
        h1 { font-size: 26px; font-weight: 600; }
        p.subtitle { font-size: 15px; color: var(--text-muted); }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 14.5px; margin-bottom: 8px; color: var(--text-muted); }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 14px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white; font-size: 16px;
        }
        button {
            width: 100%; padding: 15px;
            background: var(--primary);
            border: none; border-radius: 12px;
            color: white; font-size: 16.5px; font-weight: 600;
            margin-top: 10px;
        }
        .error-msg {
            background: rgba(239,68,68,0.1);
            border-left: 4px solid #ef4444;
            color: #fca5a5;
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .spinner {
            width: 24px; height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s;
        }
        .loader-overlay.hidden { opacity: 0; pointer-events: none; }
        @media (max-width: 480px) {
            .login-container { padding: 28px 20px; }
        }
    </style>
</head>
<body>
    <div class="background-blob"></div>
   
    <div id="loadingOverlay" class="loader-overlay">
        <div class="spinner" style="width: 55px; height: 55px; border-width: 5px;"></div>
        <p style="margin-top: 24px; color: var(--text-muted);">กำลังล้างแคชและเข้าสู่ระบบ...</p>
    </div>
    
    <div class="login-container">
        <div class="header">
            <div class="logo">🔑</div>
            <h1>เข้าสู่ระบบ</h1>
            <p class="subtitle">ระบบขอโอนอะไหล่จากคลังนวนคร</p>
        </div>
       
        <div id="errorBox" class="error-msg"></div>
       
        <div class="input-group">
            <label for="userId">Username</label>
            <input type="text" id="userId" placeholder="กรอกรหัสพนักงาน">
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••">
        </div>
       
        <div style="margin: 15px 0;">
            <input type="checkbox" id="rememberMe" checked>
            <label for="rememberMe" style="color: var(--text-muted); font-size: 14.5px;">จดจำการเข้าสู่ระบบ</label>
        </div>

        <button id="loginBtn">
            <span id="btnText">เข้าสู่ระบบ</span>
            <div id="btnSpinner" class="spinner" style="display:none;"></div>
        </button>
    </div>

    <script>
        const SHEET_ID = '1eqVoLsZxGguEbRCC5rdI4iMVtQ7CK4T3uXRdx8zE3uw';
        const JSON_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Employee_Auth`;

        const REDIRECT_MAP = {
            '0326': 'https://spareparts-request.vercel.app/',
            '0330': 'https://request-nawanakorn-newversion.vercel.app/'
        };

        const loadingOverlay = document.getElementById('loadingOverlay');
        const errorBox = document.getElementById('errorBox');

        window.onload = () => {
            localStorage.clear();
            sessionStorage.clear();

            // Auto Login
            setTimeout(() => {
                handleLogin(true);
            }, 800);
        };

        async function handleLogin(isAuto = false) {
            const userId = document.getElementById('userId').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!userId || !password) {
                if (!isAuto) showError('กรุณากรอก Username และ Password');
                hideLoading();
                return;
            }

            if (password !== userId.slice(-4)) {
                if (!isAuto) showError('Password ต้องเป็น 4 ตัวท้ายของรหัสพนักงาน');
                hideLoading();
                return;
            }

            setLoading(true);

            try {
                const response = await fetch(JSON_URL + '&t=' + Date.now(), { cache: 'no-store' });
                
                if (!response.ok) throw new Error('Network error');

                const text = await response.text();
                const jsonData = JSON.parse(text.substring(47, text.length - 2));

                const rows = jsonData.table.rows;
                const cols = jsonData.table.cols;

                const idIdx = cols.findIndex(c => c.label === 'IDRec');
                const plantIdx = cols.findIndex(c => c.label === 'Plant');

                if (idIdx === -1 || plantIdx === -1) {
                    throw new Error('Sheet structure error');
                }

                const userRow = rows.find(row => String(row.c[idIdx]?.v || '') === userId);

                if (!userRow) {
                    showError('ไม่พบรหัสพนักงานนี้ในระบบ');
                } else {
                    const plant = String(userRow.c[plantIdx]?.v || '').trim();
                    const targetUrl = REDIRECT_MAP[plant];

                    if (targetUrl) {
                        if (document.getElementById('rememberMe').checked) {
                            localStorage.setItem('remembered_id', userId);
                        }
                        window.location.href = targetUrl;
                        return; // หยุดการทำงานต่อ
                    } else {
                        showError(`Plant ${plant} ไม่มีสิทธิ์`);
                    }
                }
            } catch (err) {
                console.error(err);
                showError('เชื่อมต่อฐานข้อมูลล้มเหลว กรุณาลองใหม่อีกครั้ง');
            }

            hideLoading();
        }

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.style.display = 'block';
        }

        function setLoading(show) {
            document.getElementById('btnText').style.display = show ? 'none' : 'inline';
            document.getElementById('btnSpinner').style.display = show ? 'block' : 'none';
        }

        function hideLoading() {
            loadingOverlay.classList.add('hidden');
            setLoading(false);
        }

        document.getElementById('loginBtn').addEventListener('click', () => handleLogin(false));
    </script>
</body>
</html>
